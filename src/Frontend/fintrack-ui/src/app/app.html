<div class="app-shell min-vh-100 d-flex flex-column" data-bs-theme="dark">
  <header class="border-bottom border-secondary-subtle bg-black sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
      <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" routerLink="/dashboard">
          <span class="bg-primary-subtle text-primary-emphasis rounded-circle d-inline-flex align-items-center justify-content-center p-2">
            <i class="bi bi-graph-up-arrow"></i>
          </span>
          <span>
            <span class="d-block">FinTrack</span>
            <small class="text-muted-soft fw-normal">Painel financeiro pessoal</small>
          </span>
        </a>

        <div class="d-flex align-items-center gap-2 flex-wrap">
          @for (item of navItems; track item.path) {
            <a
              [routerLink]="item.path"
              [routerLinkActiveOptions]="{ exact: item.exact }"
              routerLinkActive="nav-link-active"
              #routeState="routerLinkActive"
              class="btn btn-sm px-3"
              [class.btn-outline-secondary]="!routeState.isActive"
            >
              <i class="bi me-2" [class]="item.icon"></i>
              {{ item.label }}
            </a>
          }
        </div>
      </div>
    </nav>
  </header>

  <main class="flex-grow-1">
    <div class="container py-4 py-lg-5">
      <router-outlet />
    </div>
  </main>
</div>
